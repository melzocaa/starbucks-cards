<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Pedidos - Starbucks Coffee</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0d6e00'
          }
        }
      }
    }
  </script>
</head>

<body class="bg-gray-100 text-gray-800">

  <!-- HEADER -->
  <header class="flex items-center justify-between px-4 py-3 bg-white shadow sticky top-0 z-50">

  <div class="flex items-center gap-3">
    
    <img src="assets/images/logo.png" alt="Starbucks Logo"
      class="w-10 h-10 object-contain">

    <!-- VOLTA ISSO -->
    <div id="statusDot" class="w-3 h-3 bg-red-500 rounded-full"></div>

    <div>
      <h1 class="text-lg font-bold leading-none text-primary">
        STARBUCKS COFFEE
      </h1>
      <span id="statusText" class="text-xs text-red-500">Offline</span>
    </div>
  </div>

  <div class="flex gap-2">
    <button id="toggleBtn" onclick="toggleStatus()"
      class="px-3 py-2 rounded-lg text-sm bg-gray-400 text-white">
      Offline
    </button>

    <button onclick="fetchOrders()"
      class="bg-[#0d6e00] text-white text-sm px-3 py-2 rounded-lg">
      ⟳
    </button>
  </div>

</header>

  <!-- CONTEÚDO -->
  <main class="p-4">

    <div class="flex justify-between items-center mb-4">
      <h2 class="text-2xl font-bold">Pedidos</h2>

      <span id="contador"
        class="bg-primary text-white text-x px-3 py-1 rounded-full transition-transform duration-200">
        0 pedidos
      </span>
    </div>

    <!-- erro -->
    <div id="erro"
        class="hidden bg-red-100 border border-red-300 text-red-700 p-4 rounded-lg text-sm mb-4 flex flex-col gap-1">
  
        <strong>Servidor indisponível</strong>
        <span>Não foi possível conectar ao backend. Verifique a API ou tente novamente.</span>
    </div>

    <!-- vazio -->
    <div id="vazio"
      class="hidden text-center text-gray-500 py-10">
      Nenhum pedido recebido.
    </div>

    <!-- lista -->
    <div id="lista" class="flex flex-col gap-3"></div>

  </main>

  <script>
    let orders = [];
    let isOnline = false;
    let pollTimer = null;
    let prevCount = 0;

    const API_URL = "https://sua-api.com/pedidos";

    function timeAgo(date) {
      const diff = Math.floor((Date.now() - new Date(date)) / 1000);
      if (diff < 60) return `${diff}s atrás`;
      if (diff < 3600) return `${Math.floor(diff / 60)}min atrás`;
      return `${Math.floor(diff / 3600)}h atrás`;
    }

    function statusLabel(s) {
      return { new: 'Novo', making: 'Preparando', ready: 'Pronto' }[s] || s;
    }

    function setOnline(v) {
      isOnline = v;
      localStorage.setItem("haruy_status", v);

      const dot = document.getElementById("statusDot");
      const txt = document.getElementById("statusText");
      const btn = document.getElementById("toggleBtn");

      if (v) {
        dot.className = "w-3 h-3 bg-green-600 rounded-full";
        txt.textContent = "Online";
        txt.className = "text-xs text-green-600";
        btn.textContent = "Online";
        btn.className = "px-3 py-2 rounded-lg text-sm bg-green-600 text-white";
        startPolling();
      } else {
        dot.className = "w-3 h-3 bg-red-500 rounded-full";
        txt.textContent = "Offline";
        txt.className = "text-xs text-red-500";
        btn.textContent = "Offline";
        btn.className = "px-3 py-2 rounded-lg text-sm bg-gray-400 text-white";
        stopPolling();
      }
    }

    function toggleStatus() {
      setOnline(!isOnline);
    }

    function startPolling() {
      stopPolling();
      fetchOrders();
      pollTimer = setInterval(fetchOrders, 10000);
    }

    function stopPolling() {
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    }

    async function fetchOrders() {
      if (!isOnline) return;

      try {
        const res = await fetch(API_URL);
        if (!res.ok) throw new Error();

        const data = await res.json();
        orders = Array.isArray(data) ? data : (data.pedidos || data.orders || []);

        document.getElementById("erro").classList.add("hidden");
        renderOrders();

      } catch (err) {
        const erro = document.getElementById("erro");
        erro.classList.remove("hidden");

        if (!navigator.onLine) {
          erro.innerHTML = `
            <strong>Sem internet</strong>
            <span>Verifique sua conexão.</span>
          `;
        } else {
          erro.innerHTML = `
            <strong>Backend indisponível</strong>
            <span>O servidor não está respondendo.</span>
          `;
        }
      }
    }

    async function setStatus(id, newStatus) {
      try {
        await fetch(`${API_URL}/${id}/status`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ status: newStatus })
        });

        const pedido = orders.find(o => String(o.id) === String(id));
        if (pedido) pedido.status = newStatus;
        renderOrders();
        setTimeout(fetchOrders, 1000);

      } catch (e) {
        alert("Erro ao atualizar pedido");
      }
    }

    function renderOrders() {
      const list     = document.getElementById('lista');
      const vazio    = document.getElementById('vazio');
      const contador = document.getElementById('contador');

      list.innerHTML = "";

      const ativos = orders.filter(o => o.status !== 'done');
      const total  = ativos.length;

      contador.innerText = total;
      if (total !== prevCount) {
        contador.style.transform = "scale(1.4)";
        setTimeout(() => contador.style.transform = "scale(1)", 200);
        prevCount = total;
      }

      if (total === 0) {
        vazio.classList.remove("hidden");
        return;
      }

      vazio.classList.add("hidden");

      ativos.forEach(o => {
        const card = document.createElement("div");
        card.className = "bg-white p-4 rounded-xl shadow flex flex-col gap-2";

        card.innerHTML = `
          <div class="flex justify-between items-center">
            <strong>#${o.id}</strong>
            <span class="text-xs bg-gray-200 px-2 py-1 rounded">
              ${statusLabel(o.status)}
            </span>
          </div>

          <p class="text-sm text-gray-500">
            ${o.cliente || "Cliente"} • ${timeAgo(o.createdAt || Date.now())}
          </p>

          <div class="text-sm">
            ${(o.itens || []).map(i => `
              <div>• ${i.qty || 1}x ${i.nome}</div>
            `).join("")}
          </div>

          <p class="text-primary font-bold">
            R$ ${(+(o.total || 0)).toFixed(2)}
          </p>

          <div class="flex gap-2 mt-2">
            ${o.status === 'new' ? `
              <button onclick="setStatus('${o.id}','making')"
                class="flex-1 bg-yellow-500 text-white py-2 rounded text-sm">
                Preparar
              </button>
            ` : ''}

            ${o.status !== 'ready' && o.status !== 'done' ? `
              <button onclick="setStatus('${o.id}','ready')"
                class="flex-1 bg-green-600 text-white py-2 rounded text-sm">
                Pronto
              </button>
            ` : ''}

            ${o.status === 'ready' ? `
              <button onclick="setStatus('${o.id}','done')"
                class="flex-1 bg-[#0d6e00] text-white py-2 rounded text-sm">
                Finalizar
              </button>
            ` : ''}
          </div>
        `;

        list.appendChild(card);
      });
    }

    (function init() {
      const saved = localStorage.getItem("haruy_status");
      setOnline(saved === "true");
    })();
  </script>

</body>
</html>
